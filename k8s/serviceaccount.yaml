# Dedicated ServiceAccounts for the dx03 backend and frontend Pods. Token
# automounting is disabled at the Pod level (see deployments) because neither
# workload needs to call the Kubernetes API. The SAs exist so PodSecurity /
# audit / RBAC reviews still have a stable identity to pin allow-lists to.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dx03-backend
  namespace: dx03-ENVIRONMENT_PLACEHOLDER
  labels:
    app: dx03-backend
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dx03-frontend
  namespace: dx03-ENVIRONMENT_PLACEHOLDER
  labels:
    app: dx03-frontend
automountServiceAccountToken: false
