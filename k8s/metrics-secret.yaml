# Metrics token secret.
#
# Required by:
#   /metrics, /api/metrics, /api/health-history, /health/ready
#
# Bootstrap (DO NOT COMMIT the rendered manifest -- this template only):
#
#   TOKEN=$(openssl rand -base64 48 | tr -d '\n=' | head -c 48)
#   kubectl -n dx03-<env> create secret generic dx03-metrics-secret \
#     --from-literal=token="$TOKEN"
#
# Then `sed -i "s|METRICS_TOKEN_PLACEHOLDER|$TOKEN|g" k8s/backend-deployment.yaml`
# at deploy time so the readiness probe header carries the same token.
apiVersion: v1
kind: Secret
metadata:
  name: dx03-metrics-secret
  namespace: dx03-ENVIRONMENT_PLACEHOLDER
type: Opaque
stringData:
  token: METRICS_TOKEN_PLACEHOLDER
