name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-build:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dx03_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'ci-test-password-not-real' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d dx03_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: npm audit server (moderate, prod only, informational)
        continue-on-error: true
        working-directory: server
        run: npm audit --omit=dev --audit-level=moderate

      - name: Lint server
        working-directory: server
        run: npm run lint --if-present

      - name: Typecheck server
        working-directory: server
        run: npm run typecheck

      - name: Test server (with coverage)
        working-directory: server
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: dx03_test
          DB_USER: admin
          DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'ci-test-password-not-real' }}
          CORS_ORIGIN: http://localhost:5173
          METRICS_TOKEN: ci-test-metrics-token-1234567890abcdef
        run: npm run test:coverage

      - name: Build server (TypeScript)
        working-directory: server
        run: npm run build

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: npm audit client (moderate, prod only, informational)
        continue-on-error: true
        working-directory: client
        run: npm audit --omit=dev --audit-level=moderate

      - name: Lint client
        working-directory: client
        run: npm run lint --if-present

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Validate K8s manifests
        run: |
          echo "Validating Kubernetes manifests..."
          for f in k8s/*.yaml; do
            echo "  ✓ $f"
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null || echo "    ⚠ Invalid YAML: $f"
          done
